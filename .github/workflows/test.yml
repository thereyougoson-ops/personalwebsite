name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Build the site, then run the quality gates against the BUILT output (dist/),
  # so minification + content-hash rewrites are exercised exactly as shipped.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Build (content-hash + minify → dist)
        run: npm run build

      - name: Serve dist
        run: python3 -m http.server 8098 --bind 127.0.0.1 --directory dist &

      - name: Wait for server
        run: |
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8098/index.html >/dev/null && break
            sleep 0.5
          done

      - name: Self-test (functional)
        run: node tests/run-selftest.mjs
        env:
          BASE_URL: http://127.0.0.1:8098

      - name: Accessibility gate (axe-core · WCAG A/AA)
        run: node tests/run-axe.mjs
        env:
          BASE_URL: http://127.0.0.1:8098

      - name: Internal link / asset check
        run: node tests/run-linkcheck.mjs
        env:
          BASE_URL: http://127.0.0.1:8098

  # Lighthouse budgets (perf / a11y / best-practices / SEO). Assertions start as "warn"
  # in lighthouserc.json so this reports real numbers without blocking; ratchet to "error" once tuned.
  lighthouse:
    runs-on: ubuntu-latest
    # informational until the budgets are tuned against a real run; flip off once green
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (content-hash + minify → dist)
        run: npm run build

      - name: Lighthouse CI
        run: npx --yes @lhci/cli@0.14.x autorun
